# Netlify config for the monorepo. Only the frontend is deployed here;
# the backend lives on Railway.

[build]
  base = "parish-booking-frontend"
  command = "npm run build"
  publish = "dist"
  # Skip the build entirely when nothing under parish-booking-frontend/ changed,
  # so a backend-only push doesn't rebuild the frontend.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

# SPA fallback for React Router. Netlify serves real static files first, so this
# does not shadow /sw.js, /manifest.webmanifest or /assets/*.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# The service worker and manifest must revalidate, or clients get stuck on a
# stale build after a deploy.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fingerprinted assets are safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
