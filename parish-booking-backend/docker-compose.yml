services:
  postgres:
    image: postgres:16-alpine
    container_name: parish-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parish
      POSTGRES_PASSWORD: parish
      POSTGRES_DB: parish_booking
    ports:
      - "5434:5432"
    volumes:
      - parish-booking-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parish -d parish_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parish-booking-pgdata:
